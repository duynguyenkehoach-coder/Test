# Render.com deployment — Facebook Group Scanner
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fb-scanner
    runtime: docker
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: FB_COOKIES
        sync: false
      - key: SCAN_INTERVAL_MINUTES
        value: "30"
      - key: MAX_POSTS_PER_GROUP
        value: "30"
      - key: MAX_POST_AGE_DAYS
        value: "3"
      - key: PORT
        value: "10000"
