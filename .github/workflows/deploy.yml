name: THG Ultimate Deploy (Self-hosted)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Images (Optimized Cache)
        run: |
          cd ${{ github.workspace }}

          # Bật BuildKit để dùng cache mount
          export DOCKER_BUILDKIT=1

          echo "🔨 Build builder stage trước (1 lần duy nhất)..."
          # Build builder stage riêng để cache — 2 target bên dưới dùng chung
          docker build \
            --target builder \
            --cache-from thg-builder:cache \
            -t thg-builder:cache \
            -f Dockerfile .

          echo "🔨 Build 2 targets song song từ cache..."
          docker build \
            --target runner-slim \
            --cache-from thg-builder:cache \
            --cache-from thg-api-slim:latest \
            -t thg-api-slim:latest \
            -f Dockerfile . &

          docker build \
            --target runner-heavy \
            --cache-from thg-builder:cache \
            --cache-from thg-scraper-heavy:latest \
            -t thg-scraper-heavy:latest \
            -f Dockerfile . &

          wait
          echo "✅ Both images built!"
          docker images | grep thg-

      - name: Deploy to Docker Compose
        run: |
          cd /root/THG_tool

          rsync -a --delete \
            --exclude='data' \
            --exclude='logs' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.git' \
            ${{ github.workspace }}/ /root/THG_tool/

          # Sync config files from data/ (excluded by rsync above)
          mkdir -p /root/THG_tool/data
          cp -f ${{ github.workspace }}/data/prod_groups.json /root/THG_tool/data/prod_groups.json 2>/dev/null || true

          echo "🚀 Recreating containers..."
          docker compose down --timeout 10
          docker compose up -d --remove-orphans

          echo "⏳ Waiting for API..."
          sleep 5
          for i in $(seq 1 10); do
            sleep 2
            HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Deploy done! HTTP 200 in $((i*2+5))s"
              docker compose ps
              break
            fi
            echo "  [$((i*2+5))s] HTTP ${HTTP}..."
          done

          # Chỉ xóa images không dùng, GIỮ LẠI cache builder
          docker image prune -f --filter "label!=cache=true"
          echo "🎉 THG Deploy hoàn tất!"
