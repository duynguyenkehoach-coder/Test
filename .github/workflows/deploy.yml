name: THG Deploy (PM2)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Code to /root/THG_tool
        run: |
          echo "📦 Syncing code to /root/THG_tool..."
          rsync -a --delete \
            --exclude='data' \
            --exclude='logs' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.pm2' \
            ${{ github.workspace }}/ /root/THG_tool/

          # Sync config files from data/ (excluded by rsync above)
          mkdir -p /root/THG_tool/data
          mkdir -p /root/THG_tool/data/sessions
          mkdir -p /root/THG_tool/logs
          cp -f ${{ github.workspace }}/data/prod_groups.json /root/THG_tool/data/prod_groups.json 2>/dev/null || true
          cp -f ${{ github.workspace }}/data/fb_cookies_*.json /root/THG_tool/data/ 2>/dev/null || true
          cp -f ${{ github.workspace }}/data/recovery_codes_*.json /root/THG_tool/data/ 2>/dev/null || true

          echo "✅ Code synced!"

          # Update API keys in VPS .env (.env excluded from rsync)
          # Ollama (self-hosted, primary)
          if grep -q 'OLLAMA_BASE_URL=' /root/THG_tool/.env; then
            echo "✅ OLLAMA_BASE_URL already in .env"
          else
            echo "OLLAMA_BASE_URL=http://127.0.0.1:11434" >> /root/THG_tool/.env
            echo "OLLAMA_MODEL=qwen2.5:3b" >> /root/THG_tool/.env
          fi

          # Cerebras API key (cloud fallback)
          if grep -q 'CEREBRAS_API_KEY=' /root/THG_tool/.env; then
            sed -i 's|CEREBRAS_API_KEY=.*|CEREBRAS_API_KEY=csk-x32fm96n6cjp5mjkmw6ryvt5hcpp94rtrndvp2w2ec3phy4w|' /root/THG_tool/.env
          else
            echo "CEREBRAS_API_KEY=csk-x32fm96n6cjp5mjkmw6ryvt5hcpp94rtrndvp2w2ec3phy4w" >> /root/THG_tool/.env
          fi

          # Sambanova API key (cloud fallback 2)
          if grep -q 'SAMBANOVA_API_KEY=' /root/THG_tool/.env; then
            sed -i 's|SAMBANOVA_API_KEY=.*|SAMBANOVA_API_KEY=382f4551-51c1-469f-be02-11ecabbc7c38|' /root/THG_tool/.env
          else
            echo "SAMBANOVA_API_KEY=382f4551-51c1-469f-be02-11ecabbc7c38" >> /root/THG_tool/.env
          fi
          echo "🔑 API keys updated in .env"

      - name: Install Dependencies
        run: |
          cd /root/THG_tool
          npm install --omit=dev 2>&1 | tail -5
          echo "✅ Backend dependencies installed"

      - name: Build React Frontend
        run: |
          cd /root/THG_tool/frontend
          npm install 2>&1 | tail -3
          npm run build
          echo "✅ Frontend built → frontend/dist/"

      - name: Stop Docker (if running)
        run: |
          cd /root/THG_tool
          docker compose down --timeout 5 2>/dev/null || true
          echo "✅ Docker stopped (or was not running)"

      - name: Ensure Ollama is Running
        run: |
          # Check if Ollama is installed
          if ! command -v ollama &> /dev/null; then
            echo "⚠️ Ollama not installed — run scripts/setup-ollama.sh first"
          else
            # Ensure Ollama service is running
            sudo systemctl start ollama 2>/dev/null || true
            sleep 3

            # Verify model is available
            if ollama list 2>/dev/null | grep -q "qwen2.5:3b"; then
              echo "✅ Ollama running with qwen2.5:3b"
            else
              echo "📥 Pulling qwen2.5:3b model..."
              ollama pull qwen2.5:3b
              echo "✅ Model pulled"
            fi

            # Health check
            HTTP=$(curl -so /dev/null -w "%{http_code}" http://127.0.0.1:11434/api/tags 2>/dev/null || echo "000")
            echo "🩺 Ollama health: HTTP ${HTTP}"
          fi

      - name: Restart PM2 Processes
        run: |
          cd /root/THG_tool

          # Verify frontend build exists
          echo "📂 Checking frontend/dist..."
          ls -la frontend/dist/ 2>/dev/null || echo "❌ frontend/dist NOT FOUND!"
          ls -la frontend/dist/index.html 2>/dev/null || echo "❌ index.html NOT FOUND!"

          # Ensure PM2 is installed
          which pm2 || npm install -g pm2

          # Full stop — kill ALL PM2 processes AND any orphaned node process on port 3000
          pm2 kill 2>/dev/null || true
          sleep 1
          # Force kill anything still holding port 3000
          fuser -k 3000/tcp 2>/dev/null || true
          pkill -f 'node src/' 2>/dev/null || true
          sleep 2

          # Fresh start
          pm2 start ecosystem.config.js
          pm2 save

          echo "⏳ Waiting for API..."
          sleep 5
          for i in $(seq 1 10); do
            sleep 2
            HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Health check: HTTP 200 in $((i*2+5))s"
              
              # Test root path specifically
              ROOT_HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              echo "🌐 Root path test: HTTP ${ROOT_HTTP}"
              ROOT_BODY=$(curl -s http://localhost:3000/ 2>/dev/null | head -c 200)
              echo "📄 Root body: ${ROOT_BODY}"
              
              pm2 status
              break
            fi
            echo "  [$((i*2+5))s] HTTP ${HTTP}..."
          done

          # Show PM2 logs (last 10 lines) for debugging
          echo "📋 PM2 API logs:"
          pm2 logs thg-api --lines 10 --nostream 2>/dev/null || true

          echo "🎉 THG PM2 Deploy hoàn tất!"
