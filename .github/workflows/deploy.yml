name: THG Deploy (PM2)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Code to /root/THG_tool
        run: |
          echo "📦 Syncing code to /root/THG_tool..."
          rsync -a --delete \
            --exclude='data' \
            --exclude='logs' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.pm2' \
            ${{ github.workspace }}/ /root/THG_tool/

          # Sync config files from data/ (excluded by rsync above)
          mkdir -p /root/THG_tool/data
          mkdir -p /root/THG_tool/data/sessions
          mkdir -p /root/THG_tool/logs
          cp -f ${{ github.workspace }}/data/prod_groups.json /root/THG_tool/data/prod_groups.json 2>/dev/null || true
          cp -f ${{ github.workspace }}/data/fb_cookies_*.json /root/THG_tool/data/ 2>/dev/null || true
          cp -f ${{ github.workspace }}/data/recovery_codes_*.json /root/THG_tool/data/ 2>/dev/null || true

          echo "✅ Code synced!"

          # Update Gemini API key in VPS .env (one-time fix — .env excluded from rsync)
          if grep -q 'GEMINI_API_KEY=' /root/THG_tool/.env; then
            sed -i 's|GEMINI_API_KEY=.*|GEMINI_API_KEY=AIzaSyC1xLCrxoYOkLFaGzD2gyIXW4nV64WkF50|' /root/THG_tool/.env
            echo "🔑 Gemini API key updated in .env"
          else
            echo "GEMINI_API_KEY=AIzaSyC1xLCrxoYOkLFaGzD2gyIXW4nV64WkF50" >> /root/THG_tool/.env
            echo "🔑 Gemini API key added to .env"
          fi

      - name: Install Dependencies
        run: |
          cd /root/THG_tool
          npm install --omit=dev 2>&1 | tail -5
          echo "✅ Backend dependencies installed"

      - name: Build React Frontend
        run: |
          cd /root/THG_tool/frontend
          npm install 2>&1 | tail -3
          npm run build
          echo "✅ Frontend built → frontend/dist/"

      - name: Stop Docker (if running)
        run: |
          cd /root/THG_tool
          docker compose down --timeout 5 2>/dev/null || true
          echo "✅ Docker stopped (or was not running)"

      - name: Restart PM2 Processes
        run: |
          cd /root/THG_tool

          # Verify frontend build exists
          echo "📂 Checking frontend/dist..."
          ls -la frontend/dist/ 2>/dev/null || echo "❌ frontend/dist NOT FOUND!"
          ls -la frontend/dist/index.html 2>/dev/null || echo "❌ index.html NOT FOUND!"

          # Ensure PM2 is installed
          which pm2 || npm install -g pm2

          # Full stop — kill ALL PM2 processes AND any orphaned node process on port 3000
          pm2 kill 2>/dev/null || true
          sleep 1
          # Force kill anything still holding port 3000
          fuser -k 3000/tcp 2>/dev/null || true
          pkill -f 'node src/' 2>/dev/null || true
          sleep 2

          # Fresh start
          pm2 start ecosystem.config.js
          pm2 save

          echo "⏳ Waiting for API..."
          sleep 5
          for i in $(seq 1 10); do
            sleep 2
            HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Health check: HTTP 200 in $((i*2+5))s"
              
              # Test root path specifically
              ROOT_HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              echo "🌐 Root path test: HTTP ${ROOT_HTTP}"
              ROOT_BODY=$(curl -s http://localhost:3000/ 2>/dev/null | head -c 200)
              echo "📄 Root body: ${ROOT_BODY}"
              
              pm2 status
              break
            fi
            echo "  [$((i*2+5))s] HTTP ${HTTP}..."
          done

          # Show PM2 logs (last 10 lines) for debugging
          echo "📋 PM2 API logs:"
          pm2 logs thg-api --lines 10 --nostream 2>/dev/null || true

          echo "🎉 THG PM2 Deploy hoàn tất!"
