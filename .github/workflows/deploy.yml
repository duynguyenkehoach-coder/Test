name: THG Deploy (PM2)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Code to /root/THG_tool
        run: |
          echo "📦 Syncing code to /root/THG_tool..."
          rsync -a --delete \
            --exclude='data' \
            --exclude='logs' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.pm2' \
            ${{ github.workspace }}/ /root/THG_tool/

          # Sync config files from data/ (excluded by rsync above)
          mkdir -p /root/THG_tool/data
          mkdir -p /root/THG_tool/data/sessions
          mkdir -p /root/THG_tool/logs
          cp -f ${{ github.workspace }}/data/prod_groups.json /root/THG_tool/data/prod_groups.json 2>/dev/null || true
          cp -f ${{ github.workspace }}/data/fb_cookies_*.json /root/THG_tool/data/ 2>/dev/null || true
          cp -f ${{ github.workspace }}/data/recovery_codes_*.json /root/THG_tool/data/ 2>/dev/null || true

          echo "✅ Code synced!"

      - name: Install Dependencies
        run: |
          cd /root/THG_tool
          npm install --omit=dev 2>&1 | tail -5
          echo "✅ Backend dependencies installed"

      - name: Build React Frontend
        run: |
          cd /root/THG_tool/frontend
          npm install 2>&1 | tail -3
          npm run build
          echo "✅ Frontend built → frontend/dist/"

      - name: Stop Docker (if running)
        run: |
          cd /root/THG_tool
          docker compose down --timeout 5 2>/dev/null || true
          echo "✅ Docker stopped (or was not running)"

      - name: Restart PM2 Processes
        run: |
          cd /root/THG_tool

          # Ensure PM2 is installed
          which pm2 || npm install -g pm2

          # Full stop + fresh start (not restart) to ensure server.js
          # re-evaluates fs.existsSync(frontend/dist) on startup
          pm2 delete all 2>/dev/null || true
          pm2 start ecosystem.config.js
          pm2 save

          echo "⏳ Waiting for API..."
          sleep 5
          for i in $(seq 1 10); do
            sleep 2
            HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Deploy done! HTTP 200 in $((i*2+5))s"
              pm2 status
              break
            fi
            echo "  [$((i*2+5))s] HTTP ${HTTP}..."
          done

          echo "🎉 THG PM2 Deploy hoàn tất!"
