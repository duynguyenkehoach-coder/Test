name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package*.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/**'

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 2018
          command_timeout: 10m
          script: |
            cd /root/THG_tool

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐳 Building & restarting Docker container..."
            docker compose build --no-cache app || echo "⚠️ Build failed (disk?), using existing image"
            docker compose up -d --no-build

            echo "=== Hot-sync: copying latest src/ + public/ into container ==="
            docker cp src/. thg-lead-gen:/app/src/
            docker cp public/. thg-lead-gen:/app/public/
            docker cp scripts/. thg-lead-gen:/app/scripts/
            docker restart thg-lead-gen
            sleep 10

            echo "=== Syncing group list from production ==="
            docker exec thg-lead-gen node scripts/sync-groups.js || true

            echo "=== Commit container to preserve Chromium ==="
            docker commit thg-lead-gen thg-lead-gen:latest || true

            echo "⏳ Waiting for container to be healthy..."
            for i in $(seq 1 15); do
              sleep 5
              HTTP=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/api/stats 2>/dev/null || echo "000")
              if [ "$HTTP" = "200" ]; then
                echo "✅ Deploy #$GITHUB_RUN_NUMBER done! HTTP 200 in $((i*5))s"
                docker ps --filter name=thg-lead-gen --format "table {{.Names}}\t{{.Status}}"
                exit 0
              fi
              echo "  [$((i*5))s] HTTP ${HTTP}..."
            done
            echo "⚠️  Health check inconclusive after 75s"
            docker logs thg-lead-gen --tail 30

      - name: Deploy summary
        if: always()
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          echo "## 🚀 Deploy #${{ github.run_number }} — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **By** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
