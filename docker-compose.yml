services:
  api:
    image: thg-api-slim:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runner-slim
    container_name: thg-api
    restart: unless-stopped
    command: ["node", "src/index.js"]
    volumes: &vols
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
    ports:
      - "0.0.0.0:3000:3000"
    deploy:
      resources:
        limits: { memory: 300M, cpus: '0.3' }
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  ai-worker:
    image: thg-api-slim:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runner-slim
    container_name: thg-ai-worker
    restart: unless-stopped
    command: ["node", "src/infra/workers/aiWorker.js"]
    volumes: *vols
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits: { memory: 300M, cpus: '0.3' }
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  scraper:
    image: thg-scraper-heavy:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runner-heavy
    container_name: thg-scraper
    restart: unless-stopped
    command: ["node", "src/infra/workers/scraperWorker.js"]
    volumes: *vols
    environment:
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits: { memory: 3.5G, cpus: '2.0' }
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"