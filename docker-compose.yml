services:
  api: &base_service
    image: ${DOCKER_IMAGE:-ghcr.io/davidanh98/thg-lead-gen:latest}
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  api-server:
    <<: *base_service
    container_name: thg-api
    command: ["node", "src/index.js"]
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: '0.3'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  scraper:
    <<: *base_service
    container_name: thg-scraper
    command: ["node", "src/workers/scraperWorker.js"]
    deploy:
      resources:
        limits:
          memory: 900M
          cpus: '0.8'

  ai-worker:
    <<: *base_service
    container_name: thg-ai-worker
    command: ["node", "src/workers/aiWorker.js"]
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: '0.3'
