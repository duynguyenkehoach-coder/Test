services:
  app:
    # CI/CD injects DOCKER_IMAGE=ghcr.io/... for fast pull deploys.
    # If not set (e.g. first run / local), builds from Dockerfile.
    image: ${DOCKER_IMAGE:-thg-lead-gen:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thg-lead-gen
    restart: unless-stopped

    # Data persistence — SQLite DB and logs survive restarts/updates
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 900M
          cpus: '0.9'

    ports:
      - "127.0.0.1:3000:3000"   # Only expose to localhost (nginx proxies externally)

    environment:
      - NODE_ENV=production

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/stats"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
