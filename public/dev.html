<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THG Dev Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Consolas', 'Monaco', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #161b22;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #30363d;
        }

        .header h1 {
            font-size: 16px;
            color: #58a6ff;
        }

        .header .badge {
            background: #238636;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }

        .toolbar {
            background: #161b22;
            padding: 8px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #30363d;
            flex-wrap: wrap;
        }

        .toolbar input,
        .toolbar select {
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        .toolbar input:focus,
        .toolbar select:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .toolbar input[type="text"] {
            width: 250px;
        }

        .toolbar button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
        }

        .toolbar button:hover {
            background: #30363d;
        }

        .toolbar button.active {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }

        .toolbar .spacer {
            flex: 1;
        }

        .toolbar .count {
            color: #8b949e;
            font-size: 12px;
        }

        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            width: 350px;
            text-align: center;
        }

        .login-box h2 {
            color: #58a6ff;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .login-box input {
            width: 100%;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            font-family: inherit;
        }

        .login-box button {
            width: 100%;
            background: #238636;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .login-box button:hover {
            background: #2ea043;
        }

        .login-box .error {
            color: #f85149;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .log-line {
            padding: 2px 0;
            font-size: 13px;
            line-height: 1.6;
            border-bottom: 1px solid #21262d;
            display: flex;
            gap: 10px;
        }

        .log-line:hover {
            background: #161b22;
        }

        .log-time {
            color: #484f58;
            min-width: 85px;
            font-size: 11px;
        }

        .log-level {
            min-width: 45px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .log-level.info {
            color: #58a6ff;
        }

        .log-level.warn {
            color: #d29922;
        }

        .log-level.error {
            color: #f85149;
        }

        .log-msg {
            flex: 1;
            word-break: break-all;
        }

        .log-msg .highlight {
            background: #553300;
            color: #ffcc00;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* Highlight patterns */
        .log-msg .success {
            color: #3fb950;
        }

        .log-msg .fail {
            color: #f85149;
        }

        .log-msg .key {
            color: #d2a8ff;
        }

        .status-bar {
            background: #161b22;
            padding: 6px 20px;
            border-top: 1px solid #30363d;
            font-size: 11px;
            color: #484f58;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔒 THG Dev Console</h2>
            <p style="color:#8b949e; margin-bottom:20px; font-size:13px">Chỉ dành cho Developer</p>
            <input type="password" id="passwordInput" placeholder="Nhập password..."
                onkeydown="if(event.key==='Enter')doLogin()">
            <button onclick="doLogin()">Đăng nhập</button>
            <div class="error" id="loginError">Sai password!</div>
        </div>
    </div>

    <div class="header">
        <h1>🖥️ THG Dev Console</h1>
        <span class="badge" id="statusBadge">CONNECTING</span>
    </div>

    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm logs..." oninput="filterLogs()">
        <select id="levelFilter" onchange="filterLogs()">
            <option value="">All Levels</option>
            <option value="info">ℹ️ Info</option>
            <option value="warn">⚠️ Warn</option>
            <option value="error">❌ Error</option>
        </select>
        <button onclick="fetchLogs()" title="Refresh">🔄 Refresh</button>
        <button id="autoBtn" onclick="toggleAuto()" title="Auto-refresh">⏸️ Auto: OFF</button>
        <button onclick="scrollToBottom()">⬇️ Bottom</button>
        <button onclick="triggerScan()" style="background:#1f6feb;border-color:#1f6feb;color:#fff"
            title="Trigger scraper scan">🚀 Scan Now</button>
        <button onclick="clearView()" style="background:#21262d;color:#8b949e">🗑️ Clear</button>
        <span class="spacer"></span>
        <span class="count" id="logCount">0 logs</span>
    </div>

    <div class="log-container" id="logContainer"></div>

    <div class="status-bar">
        <span id="lastUpdate">Last update: —</span>
        <span>Buffer: 500 lines max | Password protected</span>
    </div>

    <script>
        let password = localStorage.getItem('dev_pw') || '';
        let allLogs = [];
        let autoRefresh = false;
        let autoInterval = null;

        // Check saved password
        if (password) {
            testPassword();
        }

        async function doLogin() {
            password = document.getElementById('passwordInput').value;
            const ok = await testPassword();
            if (!ok) {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        async function testPassword() {
            try {
                const resp = await fetch(`/api/dev/logs?password=${encodeURIComponent(password)}&level=info`);
                if (resp.ok) {
                    localStorage.setItem('dev_pw', password);
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('statusBadge').textContent = 'LIVE';
                    document.getElementById('statusBadge').style.background = '#238636';
                    fetchLogs();
                    toggleAuto(); // Start auto-refresh
                    return true;
                }
            } catch (e) { }
            return false;
        }

        async function fetchLogs() {
            try {
                const resp = await fetch(`/api/dev/logs?password=${encodeURIComponent(password)}`);
                if (!resp.ok) return;
                const data = await resp.json();
                allLogs = data.data || [];
                document.getElementById('logCount').textContent = `${allLogs.length} logs`;
                document.getElementById('lastUpdate').textContent = `Last update: ${new Date().toLocaleTimeString()}`;
                filterLogs();
            } catch (e) {
                document.getElementById('statusBadge').textContent = 'OFFLINE';
                document.getElementById('statusBadge').style.background = '#f85149';
            }
        }

        function filterLogs() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const level = document.getElementById('levelFilter').value;
            let filtered = allLogs;
            if (level) filtered = filtered.filter(l => l.level === level);
            if (search) filtered = filtered.filter(l => l.msg.toLowerCase().includes(search));
            renderLogs(filtered);
        }

        function renderLogs(logs) {
            const container = document.getElementById('logContainer');
            const wasAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 50;

            container.innerHTML = logs.map(l => {
                const time = new Date(l.time).toLocaleTimeString();
                let msg = escapeHtml(l.msg);
                // Colorize patterns
                msg = msg.replace(/(✅|✓|worked|success)/gi, '<span class="success">$1</span>');
                msg = msg.replace(/(❌|✗|error|failed|exhausted)/gi, '<span class="fail">$1</span>');
                msg = msg.replace(/(\[KeyPool\]|\[Classifier\]|\[Pipeline\]|\[Scraper:\w+\]|\[FB:\w+\]|\[IG:\w+\]|\[TT:\w+\]|\[Cron\])/g, '<span class="key">$1</span>');

                // Highlight search
                const search = document.getElementById('searchInput').value;
                if (search) {
                    const regex = new RegExp(`(${escapeRegex(search)})`, 'gi');
                    msg = msg.replace(regex, '<span class="highlight">$1</span>');
                }

                return `<div class="log-line">
                    <span class="log-time">${time}</span>
                    <span class="log-level ${l.level}">${l.level}</span>
                    <span class="log-msg">${msg}</span>
                </div>`;
            }).join('');

            if (wasAtBottom) scrollToBottom();
        }

        function toggleAuto() {
            autoRefresh = !autoRefresh;
            const btn = document.getElementById('autoBtn');
            if (autoRefresh) {
                btn.textContent = '▶️ Auto: ON';
                btn.classList.add('active');
                autoInterval = setInterval(fetchLogs, 5000);
            } else {
                btn.textContent = '⏸️ Auto: OFF';
                btn.classList.remove('active');
                clearInterval(autoInterval);
            }
        }

        function scrollToBottom() {
            const c = document.getElementById('logContainer');
            c.scrollTop = c.scrollHeight;
        }

        async function triggerScan() {
            try {
                const resp = await fetch(`/api/dev/scan?password=${encodeURIComponent(password)}`, { method: 'POST' });
                const data = await resp.json();
                if (resp.ok) {
                    alert('✅ Scan triggered! Check logs for progress.');
                    if (!autoRefresh) toggleAuto();
                } else {
                    alert('❌ ' + (data.error || 'Failed'));
                }
            } catch (e) { alert('❌ Request failed: ' + e.message); }
        }

        function clearView() {
            document.getElementById('logContainer').innerHTML = '';
            document.getElementById('logCount').textContent = '0 logs (view cleared)';
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function escapeRegex(s) {
            return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
    </script>
</body>

</html>
